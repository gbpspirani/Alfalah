<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Al-Falah Model</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004d40; --accent: #fbc02d; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            background-image: linear-gradient(rgba(240, 244, 243, 0.85), rgba(240, 244, 243, 0.85)), 
                              url('https://images.unsplash.com/photo-1546410531-bb4caa6b424d?auto=format&fit=crop&w=1500&q=80');
            background-size: cover; background-attachment: fixed; background-position: center;
            padding: 15px; color: #333;
        }
        
        .wrapper { max-width: 600px; margin: 20px auto; position: relative; z-index: 10; }

        .search-container {
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: 600; color: var(--primary); margin-left: 5px; }
        
        .input-field, .select-field {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 1rem; outline: none; margin-top: 5px;
        }
        
        .btn-search {
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 15px; border-radius: 10px; font-weight: 600; cursor: pointer;
            font-size: 1rem; text-transform: uppercase;
        }

        #resultCard {
            display: none; background: var(--white); border-radius: 20px;
            overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease; position: relative;
        }
        
        /* Tehri Line Watermark */
        #resultCard::before {
            content: "Al-Falah Model Education System";
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg);
            font-size: 2rem; font-weight: 700;
            color: rgba(0, 77, 64, 0.04); white-space: nowrap;
            z-index: 1; pointer-events: none;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--accent); position: relative; z-index: 5; }
        
        /* Result Type Badge on Card */
        .result-type-label {
            background: var(--accent); color: #000; padding: 4px 15px;
            border-radius: 0 0 10px 10px; display: inline-block;
            font-size: 0.75rem; font-weight: 700; text-transform: uppercase;
        }

        .student-info { 
            display: grid; grid-template-columns: 1fr 1fr; 
            padding: 20px; background: #f9f9f9; border-bottom: 1px solid #eee; 
            font-size: 0.85rem; position: relative; z-index: 5; gap: 10px;
        }
        .info-item span { color: #888; font-size: 0.7rem; text-transform: uppercase; display: block; }
        .info-item b { color: var(--primary); font-size: 1rem; }
        
        .marks-table { width: 100%; border-collapse: collapse; position: relative; z-index: 5; }
        .marks-table th { background: #f1f1f1; text-align: left; padding: 10px 15px; font-size: 0.8rem; color: #666; }
        .marks-table td { padding: 8px 15px; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; font-weight: 600; }
        .total-row { background: #eee; font-size: 1.1rem; color: var(--primary); }

        .final-status { padding: 25px; text-align: center; position: relative; z-index: 5; }
        .status-badge { padding: 8px 30px; border-radius: 50px; font-weight: 700; display: inline-block; font-size: 1rem; }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }

        .btn-print {
            background: #444; color: white; border: none; width: 100%; margin-top: 20px;
            padding: 15px; border-radius: 12px; font-weight: 600; cursor: pointer;
            display: none; align-items: center; justify-content: center; gap: 10px;
        }

        @media print {
            body { background: white !important; }
            .search-container, .btn-print { display: none !important; }
            #resultCard { box-shadow: none; border: 1px solid #ddd; display: block !important; }
            #resultCard::before { color: rgba(0, 0, 0, 0.05) !important; }
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="search-container">
        <h2 style="font-family:'Quicksand'; color:var(--primary); margin-bottom:20px;">Student Result Portal</h2>
        <div class="input-group">
            <label>Class Selection</label>
            <select id="classInput" class="select-field">
                <option value="">Choose Class...</option>
                <option value="Nursery">Nursery</option>
                <option value="Prep">Prep</option>
                <option value="1st">1st Class</option>
                <option value="2nd">2nd Class</option>
                <option value="3rd">3rd Class</option>
                <option value="4th">4th Class</option>
                <option value="5th">5th Class</option>
                <option value="6th">6th Class</option>
                <option value="7th">7th Class</option>
                <option value="8th">8th Class</option>
            </select>
        </div>
        <div class="input-group">
            <label>Roll Number</label>
            <input type="text" id="rollInput" class="input-field" placeholder="Example: 101">
        </div>
        <button class="btn-search" onclick="fetchResult()">View Result Card</button>
    </div>

    <div id="resultCard">
        <div class="card-header">
            <h3 style="font-family:'Quicksand';">AL-FALAH MODEL EDUCATION SYSTEM</h3>
            <div id="resType" class="result-type-label">ANNUAL RESULT</div>
        </div>

        <div class="student-info">
            <div class="info-item"><span>Student Name</span><b id="resName"></b></div>
            <div class="info-item" style="text-align: right;"><span>Father's Name</span><b id="resFather"></b></div>
            <div class="info-item"><span>Class</span><b id="resClass"></b></div>
            <div class="info-item" style="text-align: right;"><span>Roll Number</span><b id="resRoll"></b></div>
        </div>

        <table class="marks-table">
            <thead><tr><th>Subject Name</th><th style="text-align:right;">Obtained Marks</th></tr></thead>
            <tbody id="subjectsBody"></tbody>
            <tfoot>
                <tr class="total-row">
                    <td style="padding:15px;"><b>TOTAL MARKS</b></td>
                    <td style="text-align:right; padding:15px;"><b id="resTotal"></b></td>
                </tr>
            </tfoot>
        </table>

        <div class="final-status">
            <div id="resBadge" class="status-badge"></div>
            <p style="font-size: 0.65rem; color: #888; margin-top: 15px;">This report is computer generated and valid for school records.</p>
        </div>
    </div>

    <button id="printBtn" class="btn-print" onclick="window.print()">
        <span>🖨️</span> Print / Save Result Card
    </button>
</div>

<script>
    async function fetchResult() {
        const roll = document.getElementById('rollInput').value.trim();
        const selectedClass = document.getElementById('classInput').value;
        const sheetLink = 'https://docs.google.com/spreadsheets/d/1x1Gr65o9duJ0qcqqVB5cI4T-JlXNybWQnCKxELZF2ak/export?format=csv';

        if(!selectedClass || !roll) return alert("Please provide Class and Roll Number!");

        try {
            const response = await fetch(sheetLink);
            const data = await response.text();
            const rows = data.split('\n').map(r => r.split(','));
            
            const student = rows.find(r => 
                r[0].trim() === roll && 
                r[2].trim().toLowerCase() === selectedClass.toLowerCase()
            );

            if(student) {
                document.getElementById('resName').innerText = student[1];
                document.getElementById('resRoll').innerText = student[0];
                document.getElementById('resClass').innerText = student[2];
                document.getElementById('resTotal').innerText = student[14];
                // New Fields
                document.getElementById('resFather').innerText = student[16] || "---"; // Column Q
                document.getElementById('resType').innerText = student[17] || "RESULT CARD"; // Column R

                const subjects = [
                    {n: "Mathematics", m: student[3]}, {n: "English", m: student[4]},
                    {n: "Science", m: student[5]}, {n: "Biology", m: student[6]},
                    {n: "Computer", m: student[7]}, {n: "Urdu", m: student[8]},
                    {n: "Physics", m: student[9]}, {n: "Chemistry", m: student[10]},
                    {n: "G.K", m: student[11]}, {n: "Islamiat", m: student[12]},
                    {n: "T.H.Q", m: student[13]}
                ];

                let tableHTML = "";
                subjects.forEach(sub => {
                    if(sub.m && sub.m.trim() !== "") {
                        tableHTML += `<tr><td>${sub.n}</td><td style="text-align:right;">${sub.m}</td></tr>`;
                    }
                });
                document.getElementById('subjectsBody').innerHTML = tableHTML;

                const status = student[15] ? student[15].trim() : "N/A";
                const badge = document.getElementById('resBadge');
                badge.innerText = status;
                badge.className = 'status-badge ' + (status.toLowerCase().includes('pass') ? 'pass' : 'fail');

                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('printBtn').style.display = 'flex';
            } else { alert("Student details not found! Please check Roll No and Class."); }
        } catch (e) { alert("Error connecting to database!"); }
    }
</script>
</body>
</html>
