<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Portal | Al-Falah Model</title>
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@600;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #004d40; --accent: #fbc02d; --white: #ffffff; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body {
            font-family: 'Poppins', sans-serif;
            /* Yahan School se mutaliq background image add ki hai */
            background-image: linear-gradient(rgba(240, 244, 243, 0.8), rgba(240, 244, 243, 0.8)), 
                              url('https://images.unsplash.com/photo-1546410531-bb4caa6b424d?auto=format&fit=crop&w=1500&q=80');
            background-size: cover;
            background-attachment: fixed;
            background-position: center;
            padding: 15px;
            color: #333;
        }
        
        .wrapper { max-width: 600px; margin: 20px auto; position: relative; z-index: 10; }

        /* Search Section */
        .search-container {
            background: rgba(255, 255, 255, 0.95); padding: 25px; border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1); text-align: center; margin-bottom: 20px;
            backdrop-filter: blur(5px);
        }
        
        .input-group { text-align: left; margin-bottom: 15px; }
        label { font-size: 0.8rem; font-weight: 600; color: var(--primary); margin-left: 5px; }
        
        .input-field, .select-field {
            width: 100%; padding: 12px; border: 2px solid #e0e0e0;
            border-radius: 10px; font-size: 1rem; outline: none; margin-top: 5px;
            background: rgba(255,255,255,0.8);
        }
        
        .btn-search {
            background: var(--primary); color: white; border: none; width: 100%;
            padding: 15px; border-radius: 10px; font-weight: 600; cursor: pointer;
            font-size: 1rem; text-transform: uppercase;
        }

        /* Result Card */
        #resultCard {
            display: none; background: var(--white); border-radius: 20px;
            overflow: hidden; box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            animation: fadeIn 0.5s ease;
            position: relative;
        }
        
        /* --- WATERMARK (Tehri Line) --- */
        #resultCard::before {
            content: "Al-Falah Model Education System";
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-45deg); /* Tehri (Diagonal) rotate */
            font-size: 2.2rem;
            font-weight: 700;
            color: rgba(0, 77, 64, 0.05); /* Transparent Teal Color */
            white-space: nowrap;
            z-index: 1; /* Data ke peeche */
            pointer-events: none; /* Click na ho sake */
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card-header { background: var(--primary); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--accent); position: relative; z-index: 5; }
        .student-info { display: grid; grid-template-columns: 1fr 1fr; padding: 15px; background: #f9f9f9; border-bottom: 1px solid #eee; font-size: 0.9rem; position: relative; z-index: 5; }
        
        .marks-table { width: 100%; border-collapse: collapse; position: relative; z-index: 5; }
        .marks-table th { background: #f1f1f1; text-align: left; padding: 10px 15px; font-size: 0.8rem; color: #666; }
        .marks-table td { padding: 8px 15px; border-bottom: 1px solid #f9f9f9; font-size: 0.9rem; font-weight: 600; }
        .total-row { background: #eee; font-size: 1rem; color: var(--primary); }

        .final-status { padding: 20px; text-align: center; position: relative; z-index: 5; }
        .status-badge { padding: 8px 25px; border-radius: 50px; font-weight: 700; display: inline-block; }
        .pass { background: #d4edda; color: #155724; }
        .fail { background: #f8d7da; color: #721c24; }

        /* Action Buttons */
        .action-btns { margin-top: 20px; display: flex; gap: 10px; position: relative; z-index: 10; }
        .btn-print {
            background: #444; color: white; border: none; flex: 1;
            padding: 12px; border-radius: 10px; font-weight: 600; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }

        /* PRINT STYLES */
        @media print {
            body { background: white !important; padding: 0; }
            body * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
            .search-container, .action-btns, .btn-search { display: none !important; }
            .wrapper { max-width: 100%; margin: 0; }
            #resultCard { box-shadow: none; border: 1px solid #eee; border-radius: 0; display: block !important; overflow: visible; }
            #resultCard::before { color: rgba(0, 77, 64, 0.08) !important; font-size: 2.5rem; } /* Print par watermark thora wazeh */
        }
    </style>
</head>
<body>

<div class="wrapper">
    <div class="search-container">
        <h2 style="font-family:'Quicksand'; color:var(--primary); margin-bottom:20px;">Student Portal</h2>
        <div class="input-group">
            <label>Select Class</label>
            <select id="classInput" class="select-field">
                <option value="">Class...</option>
                <option value="Nursery">Nursery</option>
                <option value="Prep">Prep</option>
                <option value="1st">1st Class</option>
                <option value="2nd">2nd Class</option>
                <option value="3rd">3rd Class</option>
                <option value="4th">4th Class</option>
                <option value="5th">5th Class</option>
                <option value="6th">6th Class</option>
                <option value="7th">7th Class</option>
                <option value="8th">8th Class</option>
            </select>
        </div>
        <div class="input-group">
            <label>Roll Number</label>
            <input type="text" id="rollInput" class="input-field" placeholder="Maslan: 101">
        </div>
        <button class="btn-search" onclick="fetchResult()">Show Result</button>
    </div>

    <div id="resultCard">
        <div class="card-header">
            <h3 style="font-family:'Quicksand';">RESULT REPORT CARD</h3>
            <p style="font-size: 0.7rem; opacity: 0.9;">Al-Falah Model Education System | Toot Campus</p>
        </div>

        <div class="student-info">
            <div><span>Name:</span> <br><b id="resName"></b></div>
            <div style="text-align:right;"><span>Roll No:</span> <br><b id="resRoll"></b></div>
            <div style="margin-top:10px;"><span>Class:</span> <br><b id="resClass"></b></div>
        </div>

        <table class="marks-table">
            <thead><tr><th>Subject</th><th style="text-align:right;">Marks</th></tr></thead>
            <tbody id="subjectsBody"></tbody>
            <tfoot>
                <tr class="total-row">
                    <td style="padding:12px;"><b>GRAND TOTAL</b></td>
                    <td style="text-align:right; padding:12px;"><b id="resTotal"></b></td>
                </tr>
            </tfoot>
        </table>

        <div class="final-status">
            <div id="resBadge" class="status-badge"></div>
            <p style="font-size: 0.6rem; color: #999; margin-top: 15px; display: block; position: relative; z-index: 5;">* This is a computer-generated report.</p>
        </div>
    </div>

    <div class="action-btns" id="actionBtns" style="display:none;">
        <button class="btn-print" onclick="window.print()">
            <span>🖨️</span> Print Result / Save PDF
        </button>
    </div>
</div>

<script>
    async function fetchResult() {
        const roll = document.getElementById('rollInput').value.trim();
        const selectedClass = document.getElementById('classInput').value;
        const sheetLink = 'https://docs.google.com/spreadsheets/d/1x1Gr65o9duJ0qcqqVB5cI4T-JlXNybWQnCKxELZF2ak/export?format=csv';

        if(!selectedClass || !roll) return alert("Class aur Roll Number lazmi hain!");

        try {
            const response = await fetch(sheetLink);
            const data = await response.text();
            const rows = data.split('\n').map(r => r.split(','));
            
            const student = rows.find(r => 
                r[0].trim() === roll && 
                r[2].trim().toLowerCase() === selectedClass.toLowerCase()
            );

            if(student) {
                document.getElementById('resName').innerText = student[1];
                document.getElementById('resRoll').innerText = student[0];
                document.getElementById('resClass').innerText = student[2];
                document.getElementById('resTotal').innerText = student[14];

                const subjects = [
                    {n: "Maths", m: student[3]}, {n: "English", m: student[4]},
                    {n: "Science", m: student[5]}, {n: "Biology", m: student[6]},
                    {n: "Computer", m: student[7]}, {n: "Urdu", m: student[8]},
                    {n: "Physics", m: student[9]}, {n: "Chemistry", m: student[10]},
                    {n: "G.K", m: student[11]}, {n: "Islamiat", m: student[12]},
                    {n: "T.H.Q", m: student[13]}
                ];

                let tableHTML = "";
                subjects.forEach(sub => {
                    if(sub.m && sub.m.trim() !== "") {
                        tableHTML += `<tr><td>${sub.n}</td><td style="text-align:right;">${sub.m}</td></tr>`;
                    }
                });
                document.getElementById('subjectsBody').innerHTML = tableHTML;

                const status = student[15] ? student[15].trim() : "N/A";
                const badge = document.getElementById('resBadge');
                badge.innerText = status;
                badge.className = 'status-badge ' + (status.toLowerCase().includes('pass') ? 'pass' : 'fail');

                document.getElementById('resultCard').style.display = 'block';
                document.getElementById('actionBtns').style.display = 'flex';
            } else { 
                alert("Result nahi mila! Data check karein."); 
            }
        } catch (e) { alert("Network Error!"); }
    }
</script>
</body>
</html>
